<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/css/output.css" rel="stylesheet">
    <title>وام جو</title>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <a href="./index.html" class="mb-4 text-sm text-gray-600 flex">
        برگشت به صفحه اصلی
        <svg class="size-5 mx-4 text-gray-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path fill="currentColor"
                  d="M7 239c-9.4 9.4-9.4 24.6 0 33.9L175 441c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9L81.9 280 488 280c13.3 0 24-10.7 24-24s-10.7-24-24-24L81.9 232 209 105c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0L7 239z"/>
        </svg>
    </a>

    <div class="bg-white rounded-lg shadow-lg p-8">

        <div class="text-center mb-8">
            <div class="size-16 bg-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
                <svg class="size-8 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path fill="currentColor"
                          d="M144 128a80 80 0 1 1 160 0 80 80 0 1 1 -160 0zm208 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0zM48 480c0-70.7 57.3-128 128-128l96 0c70.7 0 128 57.3 128 128l0 8c0 13.3 10.7 24 24 24s24-10.7 24-24l0-8c0-97.2-78.8-176-176-176l-96 0C78.8 304 0 382.8 0 480l0 8c0 13.3 10.7 24 24 24s24-10.7 24-24l0-8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-semibold text-gray-800 mb-2">ورود به حساب کاربری</h1>
            <p class="text-gray-600 text-base">لطفاً شماره موبایل خود را وارد کنید</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="phone" class="mylabel">
                    شماره موبایل
                </label>
                <div class="relative">
                    <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="09xxxxxxxxx"
                            maxlength="11"
                            class="myinput"
                            required
                    />
                    <div class="absolute left-4 top-1/2 -translate-y-1/2">
                        <svg class="size-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path fill="currentColor"
                                  d="M112.8 10.9c27.3-9.1 57 3.9 68.9 30l39.7 87.3c10.6 23.4 4 51-16 67.1l-24.2 19.3c25.5 50 65.5 91.4 114.4 118.8l21.2-26.6c16.1-20.1 43.7-26.7 67.1-16l87.3 39.7c26.2 11.9 39.1 41.6 30 68.9-20.7 62.3-83.7 116.2-160.9 102.6-173.7-30.6-299.6-156.5-330.2-330.2-13.6-77.2 40.4-140.1 102.6-160.9zm25.2 49.9c-1.7-3.8-6-5.7-10-4.4-45.2 15.1-79.1 58.6-70.5 107 27.1 153.8 137.4 264.2 291.2 291.3 48.4 8.5 91.9-25.3 107-70.5 1.3-4-.6-8.3-4.4-10L364 334.4c-3.4-1.5-7.4-.6-9.7 2.3l-33.5 41.9c-7 8.7-19 11.5-29 6.7-72.5-34.4-130.5-94.3-162.4-168.2-4.3-9.9-1.4-21.5 7-28.2l38.9-31.1c2.9-2.3 3.9-6.3 2.3-9.7L137.9 60.7z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn w-full">
                دریافت کد تایید
            </button>

        </form>

    </div>

    <!-- اطلاعات تماس -->
    <div class="mt-6 text-center">
        <p class="text-base text-gray-500">
            در صورت بروز مشکل با
            <a href="tel:09197459963" class="text-black font-medium hover:underline">09197459963</a>
            تماس بگیرید
        </p>
    </div>

</div>

<script>
    // اعتبارسنجی و ارسال فرم
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault()

        const phone = document.getElementById('phone').value
        const terms = document.getElementById('terms').checked

        // بررسی شماره موبایل
        if (!/^09\d{9}$/.test(phone)) {
            alert('لطفاً شماره موبایل معتبر وارد کنید')
            return
        }

        if (!terms) {
            alert('لطفاً قوانین و مقررات را بپذیرید')
            return
        }

        // ارسال درخواست
        console.log('ارسال کد تایید به:', phone)
        alert('کد تایید به شماره ' + phone + ' ارسال شد')

        // اینجا می‌توانید به صفحه تایید کد هدایت کنید
        // window.location.href = '/verify-code'
    })

    // فقط اجازه ورود اعداد
    document.getElementById('phone').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '')
    })
</script>

</body>
</html>
