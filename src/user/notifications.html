<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اعلان‌ها</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>*{font-family:system-ui,Tahoma,sans-serif}body{background:#f8fafc}.nav-item{display:flex;align-items:center;padding:.875rem 1rem;border-radius:1rem;font-size:.875rem;font-weight:600;color:#475569;transition:.2s}.nav-item:hover{background:#f8fafc;color:#0f172a}.nav-item.active{background:#eff6ff;color:#1d4ed8}</style>
</head>
<body>
<div class="min-h-screen bg-slate-50">
  <div class="mx-auto max-w-[1600px] lg:px-6">
    <div class="grid grid-cols-12 gap-6">
      <!-- sidebar -->
      <main class="col-span-full lg:col-span-9">
        <div class="p-4 lg:p-0 lg:py-6 space-y-6">
          <section class="rounded-[30px] border border-slate-200 bg-white p-5">
            <h1 class="text-xl font-bold text-slate-900">اعلان‌ها</h1>
            <p class="mt-1 text-sm text-slate-500">هشدارها، پیام‌ها و پیگیری‌ها</p>
          </section>

          <section class="rounded-[30px] border border-slate-200 bg-white p-5">
            <div class="flex flex-wrap gap-2">
              <span class="rounded-full bg-blue-600 px-3 py-1 text-xs font-semibold text-white">همه</span>
              <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">خوانده‌شده</span>
              <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">خوانده‌نشده</span>
            </div>
          </section>

          <div class="space-y-3">
            <article class="rounded-[26px] border border-slate-200 bg-blue-50 p-5">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <p class="font-semibold text-slate-900">درخواست شما تایید شد</p>
                  <p class="mt-1 text-sm text-slate-600">بانک ملی پاسخ نهایی را ثبت کرد و پرونده به مرحله بعد رفت.</p>
                </div>
                <span class="text-xs text-slate-400">2 ساعت پیش</span>
              </div>
            </article>

            <article class="rounded-[26px] border border-slate-200 bg-slate-50 p-5">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <p class="font-semibold text-slate-900">مدارک را تکمیل کنید</p>
                  <p class="mt-1 text-sm text-slate-600">کارت ملی و فیش حقوقی هنوز ناقص است.</p>
                </div>
                <span class="text-xs text-slate-400">دیروز</span>
              </div>
            </article>

            <article class="rounded-[26px] border border-slate-200 bg-slate-50 p-5">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <p class="font-semibold text-slate-900">پیام جدید از پشتیبانی</p>
                  <p class="mt-1 text-sm text-slate-600">پاسخ تیکت 1245 آماده است.</p>
                </div>
                <span class="text-xs text-slate-400">3 روز پیش</span>
              </div>
            </article>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>
</body>
</html>
