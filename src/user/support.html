<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پشتیبانی</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>*{font-family:system-ui,Tahoma,sans-serif}body{background:#f8fafc}.nav-item{display:flex;align-items:center;padding:.875rem 1rem;border-radius:1rem;font-size:.875rem;font-weight:600;color:#475569;transition:.2s}.nav-item:hover{background:#f8fafc;color:#0f172a}.nav-item.active{background:#eff6ff;color:#1d4ed8}</style>
</head>
<body>
<div class="min-h-screen bg-slate-50">
  <div class="mx-auto max-w-[1600px] lg:px-6">
    <div class="grid grid-cols-12 gap-6">
      <!-- sidebar -->
      <main class="col-span-full lg:col-span-9">
        <div class="p-4 lg:p-0 lg:py-6 space-y-6">
          <section class="rounded-[30px] border border-slate-200 bg-white p-5">
            <h1 class="text-xl font-bold text-slate-900">پشتیبانی</h1>
            <p class="mt-1 text-sm text-slate-500">ارسال تیکت، ارتباط و سوالات متداول</p>
          </section>

          <section class="grid gap-4 lg:grid-cols-3">
            <div class="rounded-[26px] border border-slate-200 bg-white p-5"><p class="text-sm text-slate-500">تیکت‌های باز</p><p class="mt-2 text-3xl font-black text-slate-900">2</p></div>
            <div class="rounded-[26px] border border-slate-200 bg-white p-5"><p class="text-sm text-slate-500">پاسخ داده شده</p><p class="mt-2 text-3xl font-black text-slate-900">8</p></div>
            <div class="rounded-[26px] border border-slate-200 bg-white p-5"><p class="text-sm text-slate-500">میانگین پاسخ</p><p class="mt-2 text-3xl font-black text-slate-900">4h</p></div>
          </section>

          <section class="rounded-[30px] border border-slate-200 bg-white p-5">
            <h2 class="text-lg font-bold text-slate-900">تیکت فعال</h2>
            <div class="mt-4 space-y-3">
              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="font-semibold text-slate-900">#1245 — مدارک وام</p>
                <p class="mt-1 text-sm text-slate-600">در حال بررسی توسط پشتیبانی</p>
              </div>
              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="font-semibold text-slate-900">#1190 — خطای ورود</p>
                <p class="mt-1 text-sm text-slate-600">بسته شده</p>
              </div>
            </div>
          </section>

          <section class="rounded-[30px] border border-slate-200 bg-white p-5">
            <h2 class="text-lg font-bold text-slate-900">ارسال پیام جدید</h2>
            <div class="mt-4 grid gap-3">
              <input class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-blue-300 focus:bg-white" placeholder="موضوع">
              <textarea class="min-h-32 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-blue-300 focus:bg-white" placeholder="متن پیام"></textarea>
              <button class="w-fit rounded-2xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white">ارسال</button>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
</div>
</body>
</html>
