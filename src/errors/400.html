<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درخواست نامعتبر | وامجو</title>
    <link href="./../assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .error-animation {
            animation: bounce 1s ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .btn-hover {
            transition: all 0.3s ease;
        }
        .btn-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-50 to-amber-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full text-center">
        <!-- 400 Animation -->
        <div class="error-animation mb-8">
            <div class="relative inline-block">
                <div class="text-9xl md:text-[200px] font-black text-yellow-600/20">400</div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-7xl md:text-8xl text-yellow-600"></i>
                </div>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-4">درخواست نامعتبر!</h1>
        <p class="text-gray-600 mb-8 text-lg">
            متأسفیم، درخواست شما قابل پردازش نیست.
        </p>

        <!-- Common Issues -->
        <div class="bg-white rounded-xl p-6 mb-8 text-right max-w-md mx-auto shadow-lg">
            <p class="font-semibold text-gray-800 mb-3">مشکلات احتمالی:</p>
            <ul class="text-sm text-gray-600 space-y-2">
                <li><i class="fas fa-times-circle text-red-500 ml-2"></i> لینک ناقص یا معیوب</li>
                <li><i class="fas fa-times-circle text-red-500 ml-2"></i> پارامترهای نامعتبر در آدرس</li>
                <li><i class="fas fa-times-circle text-red-500 ml-2"></i> اطلاعات ارسالی ناقص</li>
            </ul>
        </div>

        <!-- Actions -->
        <div class="flex flex-wrap gap-4 justify-center">
            <a href="javascript:history.back()" class="btn-hover inline-flex items-center gap-2 bg-yellow-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:bg-yellow-700">
                <i class="fas fa-arrow-right"></i>
                بازگشت به صفحه قبل
            </a>
            <a href="/" class="btn-hover inline-flex items-center gap-2 bg-white text-gray-700 px-6 py-3 rounded-xl font-semibold shadow-lg border border-gray-200 hover:bg-gray-50">
                <i class="fas fa-home"></i>
                صفحه اصلی
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-sm text-gray-400">
            <i class="fas fa-question-circle"></i> در صورت تکرار مشکل با پشتیبانی تماس بگیرید
        </div>
    </div>

</body>
</html>
