<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | وامجو</title>
    <link href="./../assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .error-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .btn-hover {
            transition: all 0.3s ease;
        }
        .btn-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full text-center">
        <!-- 404 Animation -->
        <div class="error-animation mb-8">
            <div class="relative inline-block">
                <div class="text-9xl md:text-[200px] font-black text-blue-600/20">404</div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fas fa-search text-7xl md:text-8xl text-blue-600"></i>
                </div>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-4">اوه! صفحه پیدا نشد</h1>
        <p class="text-gray-600 mb-8 text-lg">
            متأسفیم، صفحه‌ای که به دنبال آن هستید وجود ندارد یا حذف شده است.
        </p>

        <!-- Actions -->
        <div class="flex flex-wrap gap-4 justify-center mb-12">
            <a href="/" class="btn-hover inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:bg-blue-700">
                <i class="fas fa-home"></i>
                بازگشت به صفحه اصلی
            </a>
            <a href="javascript:history.back()" class="btn-hover inline-flex items-center gap-2 bg-white text-gray-700 px-6 py-3 rounded-xl font-semibold shadow-lg border border-gray-200 hover:bg-gray-50">
                <i class="fas fa-arrow-right"></i>
                بازگشت به صفحه قبل
            </a>
        </div>

        <!-- Quick Links -->
        <div class="border-t border-gray-200 pt-8">
            <p class="text-gray-500 mb-4">شاید این صفحات به کارتان بیاید:</p>
            <div class="flex flex-wrap gap-3 justify-center">
                <a href="/seller/dashboard.html" class="text-blue-600 hover:text-blue-700 text-sm">پنل فروشنده</a>
                <span class="text-gray-300">|</span>
                <a href="/user/dashboard.html" class="text-blue-600 hover:text-blue-700 text-sm">پنل کاربری</a>
                <span class="text-gray-300">|</span>
                <a href="/loan/loan.html" class="text-blue-600 hover:text-blue-700 text-sm">وام‌ها</a>
                <span class="text-gray-300">|</span>
                <a href="/request/request.html" class="text-blue-600 hover:text-blue-700 text-sm">درخواست وام</a>
                <span class="text-gray-300">|</span>
                <a href="/contact.html" class="text-blue-600 hover:text-blue-700 text-sm">تماس با ما</a>
            </div>
        </div>


    </div>

</body>
</html>
