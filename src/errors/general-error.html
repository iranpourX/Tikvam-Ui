<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطا | وامجو</title>
    <link href="./../assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .btn-hover {
            transition: all 0.3s ease;
        }
        .btn-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full text-center">
        <!-- Icon -->
        <div class="mb-8">
            <div class="w-32 h-32 mx-auto bg-red-100 rounded-full flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-5xl text-red-600"></i>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-4">خطا!</h1>
        <div id="errorMessage" class="text-gray-600 mb-8 text-lg">
            <!-- error message will be shown here -->
        </div>

        <!-- Actions -->
        <div class="flex flex-wrap gap-4 justify-center">
            <button onclick="location.reload()" class="btn-hover inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:bg-blue-700">
                <i class="fas fa-sync-alt"></i>
                تلاش مجدد
            </button>
            <a href="/" class="btn-hover inline-flex items-center gap-2 bg-white text-gray-700 px-6 py-3 rounded-xl font-semibold shadow-lg border border-gray-200 hover:bg-gray-50">
                <i class="fas fa-home"></i>
                صفحه اصلی
            </a>
        </div>

        <!-- Report Button -->
        <div class="mt-8">
            <button onclick="reportError()" class="text-gray-400 text-sm hover:text-gray-500">
                <i class="fas fa-flag"></i> گزارش خطا
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-sm text-gray-400">
            <i class="fas fa-code-branch"></i> کد خطا: <span id="errorCode">ERR-000</span>
        </div>
    </div>

    <script>
        // دریافت خطا از URL
        const urlParams = new URLSearchParams(window.location.search);
        const errorMsg = urlParams.get('message');
        const errorCode = urlParams.get('code');
        
        if (errorMsg) {
            document.getElementById('errorMessage').innerHTML = errorMsg;
        } else {
            document.getElementById('errorMessage').innerHTML = 'متأسفیم، خطایی رخ داده است. لطفاً دوباره تلاش کنید.';
        }
        
        if (errorCode) {
            document.getElementById('errorCode').innerText = errorCode;
        }
        
        function reportError() {
            alert('خطا گزارش شد. تیم فنی در اسرع وقت پیگیری می‌کند.');
        }
    </script>
</body>
</html>
