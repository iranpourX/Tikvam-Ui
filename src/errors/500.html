<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطای سرور | وامجو</title>
    <link href="./../assets/css/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .error-animation {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .btn-hover {
            transition: all 0.3s ease;
        }
        .btn-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-800 to-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full text-center">
        <!-- 500 Animation -->
        <div class="error-animation mb-8">
            <div class="relative inline-block">
                <div class="text-9xl md:text-[200px] font-black text-white/10">500</div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fas fa-server text-7xl md:text-8xl text-orange-500"></i>
                </div>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">خطای داخلی سرور!</h1>
        <p class="text-gray-300 mb-8 text-lg">
            متأسفیم، مشکلی در سرور رخ داده است. تیم فنی در حال رفع مشکل هستند.
        </p>

        <!-- Actions -->
        <div class="flex flex-wrap gap-4 justify-center mb-12">
            <button onclick="location.reload()" class="btn-hover inline-flex items-center gap-2 bg-orange-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:bg-orange-700">
                <i class="fas fa-sync-alt"></i>
                تلاش مجدد
            </button>
            <a href="/" class="btn-hover inline-flex items-center gap-2 bg-white text-gray-800 px-6 py-3 rounded-xl font-semibold shadow-lg hover:bg-gray-100">
                <i class="fas fa-home"></i>
                صفحه اصلی
            </a>
        </div>

        <!-- Suggestions -->
        <div class="border-t border-gray-700 pt-8">
            <p class="text-gray-400 mb-4">چه کاری می‌توانید انجام دهید:</p>
            <ul class="text-sm text-gray-400 space-y-2">
                <li><i class="fas fa-sync-alt text-orange-500 ml-2"></i> چند دقیقه دیگر دوباره تلاش کنید</li>
                <li><i class="fas fa-bug text-orange-500 ml-2"></i> مشکل را به پشتیبانی گزارش دهید</li>
                <li><i class="fas fa-clock text-orange-500 ml-2"></i> معمولاً این مشکل در عرض چند دقیقه برطرف می‌شود</li>
            </ul>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-sm text-gray-500">
            <i class="fas fa-envelope"></i> گزارش خطا: support@tikvam.info
        </div>
    </div>

</body>
</html>
